name: Weekly Price Scrape & Deploy

on:
  schedule:
    # Runs every Monday at 00:00 UTC
    - cron: '0 12 * * 1'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write # Needed to push data back

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Run Full Scrape
        run: npm run scrape:all

      - name: Commit and Push Data
        run: |
          git config --global user.name "PriceTrack Bot"
          git config --global user.email "bot@pricetrack.retail"
          git add public/data/products.json
          git commit -m "Automated Weekly Scrape: $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push origin main

      - name: Sync to Firestore Database
        run: node scripts/migrate_to_firestore.js
        env:
          SERVICE_ACCOUNT_KEY: ${{ secrets.SERVICE_ACCOUNT_KEY }}

      - name: Build Dashboard
        run: npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_PULPERIA_M_9137D }}'
          projectId: pulperia-m-9137d
          channelId: live
