name: Weekly Scraper & Deploy

on:
  schedule:
    # Runs every Monday at 6:00 AM (UTC). You may need to adjust for Costa Rica time (CST is UTC-6, so 12:00 PM UTC = 6:00 AM CST)
    - cron: '0 12 * * 1'
  workflow_dispatch: # Allows you to run this manually from the Actions tab

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Scraper
        # This will scrape Walmart/Masxmenos and clean the data
        run: npm run scrape:all

      - name: Build Dashboard
        run: npm run build

      # Once you configure Firebase Firestore in the future, we will replace this step
      # with a script that pushes the JSON data to the active database.
      - name: Commit Scraped Data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automated Web Scrape: Updated products.json"
          file_pattern: "public/data/products.json"

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_PULPERIA_M_9137D }}'
          projectId: pulperia-m-9137d
          channelId: live
